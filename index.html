<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --primary: #4A90E2; 
            --income: #2ECC71; 
            --expense: #E74C3C; 
            --bg: #F0F2F5; 
            --kbank-bg: #E8F5E9; --kbank-text: #138B2E;
            --bay-bg: #FFF9E6; --bay-text: #B8860B;
            --scb-bg: #F3E5F5; --scb-text: #4E2E7F; /* สีม่วงไทยพาณิชย์ */
            --cash-bg: #F5F5F5; --cash-text: #616161;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Prompt', sans-serif; background-color: var(--bg); margin: 0; padding: 0; display: flex; justify-content: center; height: 100vh; width: 100vw; overflow: hidden; }
        .container { width: 100%; max-width: 500px; background: white; height: 100%; display: flex; flex-direction: column; position: relative; }

        /* --- หน้า Login --- */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; height: 100%; width: 100%; background: white; position: absolute; z-index: 100; }
        .login-box { width: 100%; text-align: center; }
        .login-box h2 { color: var(--primary); font-size: 2.5em; margin: 0; }
        .login-box input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #EEE; border-radius: 12px; font-size: 1.1em; text-align: center; }

        /* --- หน้าหลัก --- */
        #app-content { display: none; flex-direction: column; height: 100%; width: 100%; }
        .app-header { padding: 15px; background: white; border-bottom: 1px solid #EEE; flex-shrink: 0; }
        .scroll-content { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }

        .total-balance { background: linear-gradient(135deg, #333, #555); color: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        .total-balance h4 { margin: 0; opacity: 0.8; font-weight: 300; font-size: 0.8em; }
        .total-balance h2 { margin: 5px 0 0; font-size: 1.8em; }

        /* ปรับเป็น 2 คอลัมน์เพื่อให้รองรับ 4 บัญชีแล้วไม่เบียด */
        .wallet-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .wallet-box { padding: 8px; border-radius: 12px; text-align: center; color: white; font-size: 0.7em; }
        .wallet-box p { margin: 3px 0 0; font-weight: 600; font-size: 1em; }

        form { display: flex; flex-direction: column; gap: 8px; background: #F9F9F9; padding: 15px; border-radius: 15px; margin: 15px 0; }
        input, select, button { padding: 10px; border: 1px solid #DDD; border-radius: 10px; font-family: 'Prompt'; font-size: 1em; }
        button.btn-main { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; padding: 12px; }

        /* ประวัติรายการ */
        .item-card { padding: 12px; margin-bottom: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid transparent; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item-kbank { background: var(--kbank-bg); border-left-color: var(--kbank-text); }
        .item-bay { background: var(--bay-bg); border-left-color: var(--bay-text); }
        .item-scb { background: var(--scb-bg); border-left-color: var(--scb-text); }
        .item-cash { background: var(--cash-bg); border-left-color: var(--cash-text); }

        .acc-tag { font-size: 0.6em; padding: 2px 8px; border-radius: 10px; color: white; font-weight: 600; margin-top: 4px; display: inline-block; }
        .delete-btn { background: rgba(231, 76, 60, 0.1); color: var(--expense); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; line-height: 0; padding: 0; }
        
        .section-title { font-weight: 600; color: #333; margin: 20px 0 10px; border-left: 4px solid var(--primary); padding-left: 10px; font-size: 1em; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <div class="login-box">
            <h2>💰 My Wallet</h2>
            <input type="password" id="user-pass" placeholder="รหัสผ่านของคุณ" autofocus>
            <button class="btn-main" style="width:100%" onclick="login()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="app-content">
        <div class="app-header">
            <div class="total-balance">
                <h4>ยอดเงินรวมทั้งหมด</h4>
                <h2 id="total-balance">฿0.00</h2>
            </div>
            <div class="wallet-container">
                <div class="wallet-box" style="background:#138B2E">กสิกร<p id="bal-kbank">฿0</p></div>
                <div class="wallet-box" style="background:#DAA520; color:#333">กรุงศรี<p id="bal-bay">฿0</p></div>
                <div class="wallet-box" style="background:#4E2E7F">ไทยพาณิชย์<p id="bal-scb">฿0</p></div>
                <div class="wallet-box" style="background:#7F8C8D">เงินสด<p id="bal-cash">฿0</p></div>
            </div>
        </div>

        <div class="scroll-content">
            <form id="form">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <select id="account">
                        <option value="kbank">กสิกร</option>
                        <option value="bay">กรุงศรี</option>
                        <option value="scb">ไทยพาณิชย์</option>
                        <option value="cash">เงินสด</option>
                    </select>
                    <select id="type">
                        <option value="income">รายรับ (+)</option>
                        <option value="expense" selected>รายจ่าย (-)</option>
                    </select>
                </div>
                <input type="text" id="text" placeholder="ระบุรายการ..." required>
                <input type="number" id="amount" placeholder="0.00" required step="0.01">
                <input type="date" id="date" required>
                <button type="submit" class="btn-main">บันทึกข้อมูล</button>
            </form>

            <label style="font-size: 0.8em; color: #666;">🔍 กรองตามเดือน:</label>
            <select id="month-filter" onchange="renderUI()" style="width: 100%; margin-bottom: 20px; background: #fff;"></select>

            <h3 class="section-title">📊 สรุปรายเดือน</h3>
            <div id="monthly-list"></div>

            <h3 class="section-title">🕒 ประวัติรายการ</h3>
            <div id="list"></div>
            
            <button onclick="logout()" style="width:100%; background:none; border:none; color:#999; text-decoration:underline; margin:30px 0; cursor:pointer;">ออกจากระบบ</button>
        </div>
    </div>
</div>

<script>
    // --- อย่าลืมใส่ Config Firebase ของคุณตรงนี้ ---
    const firebaseConfig = {
        apiKey: "AIzaSyBATLcMZbMuQmnIlG0edT0EPs4FCSWEets",
        authDomain: "mymoney-c730b.firebaseapp.com",
        databaseURL: "https://mymoney-c730b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mymoney-c730b",
        storageBucket: "mymoney-c730b.firebasestorage.app",
        messagingSenderId: "1086026909674",
        appId: "G-289LBX9897"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let userKey = "";
    let transactions = [];

    const accNames = { kbank: "กสิกร", bay: "กรุงศรี", scb: "ไทยพาณิชย์", cash: "เงินสด" };
    const accColors = { kbank: "#138B2E", bay: "#DAA520", scb: "#4E2E7F", cash: "#7F8C8D" };

    function formatMoney(num) { return Number(num).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function login() {
        const pass = document.getElementById('user-pass').value;
        if (!pass) return;
        userKey = btoa(pass);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        loadData();
    }
    function logout() { location.reload(); }

    function loadData() {
        db.ref('users/' + userKey).on('value', (snapshot) => {
            const data = snapshot.val();
            transactions = data ? Object.keys(data).map(key => ({...data[key], fbKey: key})) : [];
            renderUI();
        });
    }

    function renderUI() {
        const list = document.getElementById('list');
        const mList = document.getElementById('monthly-list');
        const monthFilter = document.getElementById('month-filter');
        const selectedMonth = monthFilter.value || 'all';

        list.innerHTML = ''; mList.innerHTML = '';

        let total = 0, kbank = 0, bay = 0, scb = 0, cash = 0;
        const summary = {};
        const uniqueMonths = new Set();

        transactions.forEach(t => {
            const amt = parseFloat(t.amount);
            total += amt;
            if (t.account === 'kbank') kbank += amt;
            if (t.account === 'bay') bay += amt;
            if (t.account === 'scb') scb += amt;
            if (t.account === 'cash') cash += amt;
            uniqueMonths.add(t.date.substring(0, 7));
        });

        // อัปเดต Filter
        const prevMonth = monthFilter.value;
        monthFilter.innerHTML = '<option value="all">แสดงทั้งหมด</option>';
        Array.from(uniqueMonths).sort().reverse().forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.textContent = `เดือน ${m}`;
            monthFilter.appendChild(opt);
        });
        monthFilter.value = prevMonth || 'all';

        transactions.sort((a,b) => new Date(b.date) - new Date(a.date));

        transactions.forEach(t => {
            const amt = parseFloat(t.amount);
            const mKey = t.date.substring(0, 7);

            if(!summary[mKey]) summary[mKey] = {inc: 0, exp: 0};
            if(amt > 0) summary[mKey].inc += amt;
            else summary[mKey].exp += Math.abs(amt);

            if (selectedMonth !== 'all' && mKey !== selectedMonth) return;

            const card = document.createElement('div');
            card.className = `item-card item-${t.account}`;
            card.innerHTML = `
                <div>
                    <strong>${t.text}</strong><br>
                    <small style="color:#888">${t.date}</small><br>
                    <span class="acc-tag" style="background:${accColors[t.account]}">${accNames[t.account]}</span>
                </div>
                <div style="text-align:right; display:flex; align-items:center; gap:10px;">
                    <span style="font-weight:600; color:${amt > 0 ? '#2ECC71' : '#E74C3C'}">${amt > 0 ? '+' : ''}${formatMoney(amt)}</span>
                    <button class="delete-btn" onclick="deleteData('${t.fbKey}')">✕</button>
                </div>
            `;
            list.appendChild(card);
        });

        document.getElementById('total-balance').innerText = '฿' + formatMoney(total);
        document.getElementById('bal-kbank').innerText = '฿' + formatMoney(kbank);
        document.getElementById('bal-bay').innerText = '฿' + formatMoney(bay);
        document.getElementById('bal-scb').innerText = '฿' + formatMoney(scb);
        document.getElementById('bal-cash').innerText = '฿' + formatMoney(cash);

        Object.keys(summary).sort().reverse().forEach(m => {
            if (selectedMonth !== 'all' && m !== selectedMonth) return;
            const item = document.createElement('div');
            item.className = 'monthly-item';
            item.style = "background:#fff; border:1px solid #eee; padding:15px; border-radius:15px; margin-bottom:10px;";
            item.innerHTML = `
                <div style="text-align:center; font-weight:600; color:var(--primary); margin-bottom:5px;">เดือน ${m}</div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; text-align:center; font-size:0.8em;">
                    <div>รับ<br><b style="color:#2ECC71">${formatMoney(summary[m].inc)}</b></div>
                    <div>จ่าย<br><b style="color:#E74C3C">${formatMoney(summary[m].exp)}</b></div>
                    <div>เหลือ<br><b>${formatMoney(summary[m].inc - summary[m].exp)}</b></div>
                </div>
            `;
            mList.appendChild(item);
        });
    }

    document.getElementById('form').addEventListener('submit', (e) => {
        e.preventDefault();
        const newData = {
            account: document.getElementById('account').value,
            text: document.getElementById('text').value,
            amount: document.getElementById('type').value === 'expense' ? -Math.abs(document.getElementById('amount').value) : Math.abs(document.getElementById('amount').value),
            date: document.getElementById('date').value
        };
        db.ref('users/' + userKey).push(newData);
        document.getElementById('text').value = '';
        document.getElementById('amount').value = '';
    });

    function deleteData(key) {
        if(confirm('ลบรายการนี้ใช่หรือไม่?')) db.ref('users/' + userKey + '/' + key).remove();
    }
    document.getElementById('date').valueAsDate = new Date();
    
    function setToToday() {
        const now = new Date();
        // ปรับเวลาให้ตรงกับ Timezone ประเทศไทย (UTC+7) เพื่อความแม่นยำ
        const offset = now.getTimezoneOffset() * 60000;
        const localISOTime = (new Date(now - offset)).toISOString().slice(0, 10);
        document.getElementById('date').value = localISOTime;
    }

    setToToday();
    
</script>

</body>
</html>
